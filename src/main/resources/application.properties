spring.application.name=ferreteria

#Configurando bd
spring.datasource.url=jdbc:mysql://localhost:3306/db_ferreteria
spring.datasource.username=root
spring.datasource.password=1214
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Se le dice que lenguaje se va a usar
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#Imprime en consola las consultas que se ejecuten
spring.jpa.show-sql=true
#Crea las tablas automaticamente cuando el servidor suba
spring.jpa.hibernate.ddl-auto=update

